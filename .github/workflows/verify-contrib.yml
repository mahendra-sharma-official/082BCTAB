name: Enforce and Inject PR Meta
on:
  pull_request:
    types: [opened, edited, synchronize]
jobs:
  validate-and-stamp:
    runs-on: ubuntu-latest
    # Explicitly grant the GITHUB_TOKEN write access to PRs and checks
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Validate Checkboxes and Log Syntax
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";

            // Must have at least one Contribution Type checkbox checked: - [x]
            const hasCheckedBox = /-\s*\[x\]/i.test(prBody);

            // @ LOG : `...` line  must be present with actual content
            const hasLogHeader = /@\s*LOG\s*:\s*`[^`]+`/i.test(prBody);

            // At least one Action block header must be present: eg-> `# Created` :  etc.
            const hasActionHeader = /`#\s*(Created|Added|Changed|Modified|Restructured|Deleted|Removed|Fixed|Completed|Finished|Miscellaneous|[A-Za-z][A-Za-z ]*)`\s*:/i.test(prBody);

            // At least one file bullet: - `File/Component` : description required.
            const hasFileBullets = /-\s*`[^`]+`\s*:\s*\S+/.test(prBody);

            // Author / Authored Date footer must be present
            const hasAuthorLine = /Author:\s*\*\*[^*]+\*\*/i.test(prBody);
            const hasDateLine = /Authored Date:\s*\*\*[^*]+\*\*/i.test(prBody);

            //No leftover placeholder text (shouldn't just be the template text being left as leftover)
            const placeholderStrings = [
              "<Action Key Word>",
              "<File/Component Name>",
              "< A log message >",
              "your-name/username",
              "Current-date"
            ];
            const hasPlaceholders = placeholderStrings.some(p => prBody.includes(p));

            if (!hasCheckedBox || !hasLogHeader || !hasActionHeader || !hasFileBullets || !hasAuthorLine || !hasDateLine || hasPlaceholders) {

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `❌ **PR Validation Failed!** Your description must use our strict logging format.\n\n**Requirements:**\n1. Check at least one **Contribution Type** checkbox \`- [x]\`.\n2. Include your log line: \`@ LOG : \\\`<message>\\\`\`\n3. Use valid Action headers like \`\` \`# Created\` : \`\` followed by backtick-wrapped file bullets.\n4. Keep the \`Author:\` and \`Authored Date:\` footer lines intact.\n5. Replace all default placeholder text fields.`
              });
              core.setFailed("PR description failed structural validation rules.");
            }

      - name: Inject Verified Username and Date Stamp
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";
            const username = context.actor;
            const today = new Date().toISOString().split('T')[0];

            // Replace whatever is between ** ** on the Author / Authored Date lines
            // to add the username and current date
            let updatedBody = prBody
              .replace(/(Author:\s*\*\*)[^*]*(\*\*)/i, `$1${username}$2`)
              .replace(/(Authored Date:\s*\*\*)[^*]*(\*\*)/i, `$1${today}$2`);

            if (prBody !== updatedBody) {dify author line in pull request template
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: updatedBody
              });
            }
