name: Enforce and Inject PR Meta
on:
  pull_request:
    types: [opened, edited, synchronize]
jobs:
  validate-and-stamp:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Validate Checkboxes and Log Syntax
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";

            const hasCheckedBox = /-\s*\[x\]/i.test(prBody);
            const hasLogHeader = /@\s*LOG\s*:\s*`[^`]+`/i.test(prBody);
            const hasActionHeader = /`#\s*(Created|Added|Changed|Modified|Restructured|Deleted|Removed|Fixed|Completed|Finished|Miscellaneous|[A-Za-z][A-Za-z ]*)`\s*:/i.test(prBody);
            const hasFileBullets = /-\s*`[^`]+`\s*:\s*\S+/.test(prBody);
            const hasAuthorLine = /Author:\s*\*\*[^*]+\*\*/i.test(prBody);
            const hasDateLine = /Authored Date:\s*\*\*[^*]+\*\*/i.test(prBody);

            const placeholderStrings = [
              "<Action Key Word>",
              "<File/Component Name>",
              "< A log message >",
              "your-name/username",
              "Current-date"
            ];
            const hasPlaceholders = placeholderStrings.some(p => prBody.includes(p));

            if (!hasCheckedBox || !hasLogHeader || !hasActionHeader || !hasFileBullets || !hasAuthorLine || !hasDateLine || hasPlaceholders) {

              const commentBody = [
                "❌ **PR Validation Failed!** Your description must use our strict logging format.",
                "",
                "**Requirements:**",
                "1. Check at least one **Contribution Type** checkbox: `- [x]`",
                "2. Include your log line in the form: @ LOG : with a backtick-wrapped message",
                "3. Use valid Action headers like `# Created` : followed by backtick-wrapped file bullets.",
                "4. Keep the `Author:` and `Authored Date:` footer lines intact.",
                "5. Replace all default placeholder text fields."
              ].join("\n");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: commentBody
              });
              core.setFailed("PR description failed structural validation rules.");
            }

      - name: Inject Verified Username and Date Stamp
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";
            const username = context.actor;
            const today = new Date().toISOString().split('T')[0];

            let updatedBody = prBody
              .replace(/(Author:\s*\*\*)[^*]*(\*\*)/i, "$1" + username + "$2")
              .replace(/(Authored Date:\s*\*\*)[^*]*(\*\*)/i, "$1" + today + "$2");

            if (prBody !== updatedBody) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: updatedBody
              });
            }
