name: Enforce and Inject PR Meta

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-and-stamp:
    runs-on: ubuntu-latest
    # Explicitly grant the GITHUB_TOKEN write access to PRs and checks
    permissions:
      pull-requests: write
      issues: write
      contents: read
    
    steps:
      - name: Validate Checkboxes and Log Syntax
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";

            // 1. Check if at least one checkbox is checked
            const hasCheckedBox = prBody.includes("- [x]");

            // 2. Check for the @ LOG string
            const hasLogHeader = /@\s*LOG\s*:/i.test(prBody);

            // 3. Check for at least one Action block (# Action :)
            const hasActionHeader = /#\s*(Created|Added|Changed|Modified|Restructured|Deleted|Removed|Fixed|Completed|Finished|Miscellaneous|.+)\s*:/i.test(prBody);

            // 4. Check for file bullet points
            const hasFileBullets = prBody.includes("- ");

            // 5. Ensure they didn't leave default bracket placeholders unchanged
            const hasPlaceholders = prBody.includes("[Your Name]") || prBody.includes("[Action Key Word]") || prBody.includes("[File/Component Name]");

            if (!hasCheckedBox || !hasLogHeader || !hasActionHeader || !hasFileBullets || hasPlaceholders) {
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `❌ **PR Validation Failed!** Your description must use our strict logging format.\n\n**Requirements:**\n1. Check at least one **Contribution Type** checkbox \`- [x]\`.\n2. Include your signature line: \`@ LOG :\`\n3. Use valid Action headers starting with \`#\`, followed by a bullet list of files.\n4. Replace all default placeholder text fields.`
              });

              core.setFailed("PR description failed structural validation rules.");
            }

      - name: Inject Verified Username and Date Stamp
        if: success() && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || "";
            const username = context.actor; 
            const today = new Date().toISOString().split('T')[0]; 
            
            // Replaces "@ LOG : ..." with the real GitHub username and timestamp
            const updatedBody = prBody.replace(/@\s*LOG\s*:?.*/i, `@ LOG : ${username} | Date: ${today}`);

            if (prBody !== updatedBody) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: updatedBody
              });
            }
